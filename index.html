<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:#fff;
}

/* HERO */
.hero {
  position:relative;
  height:90vh;
  background:url('front.jpg') center/cover no-repeat;
}

.hero::after {
  content:'';
  position:absolute;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.65);
}

.hero-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.hero h1 {
  font-size:50px;
}

.hero p {
  color:#c89b5b;
}

/* BUTTONS */
.btn {
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  background:#c89b5b;
  color:#000;
  text-decoration:none;
  border-radius:5px;
  transition:0.3s;
}

.btn:hover {
  transform:translateY(-5px);
}

/* CAROUSEL */
.carousel {
  overflow:hidden;
  padding:40px 0;
}

.carousel-track {
  display:flex;
  animation:scroll 25s linear infinite;
}

.carousel img {
  width:400px;
  margin:0 15px;
  border-radius:10px;
}

@keyframes scroll {
  0% {transform:translateX(0);}
  100% {transform:translateX(-50%);}
}

/* CONTACT */
.contact {
  text-align:center;
  padding:40px;
}
</style>

</head>
